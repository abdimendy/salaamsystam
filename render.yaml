# Deploy API on https://render.com (free tier)
# 1. Push repo to GitHub
# 2. Render → New → Blueprint → connect repo
# 3. Add env: FRONTEND_URL = your Vercel URL (after frontend deploy)

services:
  - type: web
    name: yellowbook-api
    runtime: docker
    dockerfilePath: ./backend/YellowBook.API/Dockerfile
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      # Optional: Neon/Supabase web Postgres (overrides Render DB when set)
      - key: DATABASE_URL
        sync: false
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: yellowbook-db
          property: connectionString
      - key: ENABLE_SWAGGER
        value: "true"
      # e.g. https://yellowbook-live.vercel.app (also allowed via *.vercel.app in Program.cs)
      - key: FRONTEND_URL
        sync: false
      - key: Jwt__Key
        generateValue: true
      - key: Jwt__Issuer
        value: YellowBookAPI
      - key: Jwt__Audience
        value: YellowBookClient
      - key: AdminUser__Username
        value: admin
      - key: AdminUser__Password
        sync: false
      - key: CLOUDINARY_URL
        sync: false

databases:
  - name: yellowbook-db
    plan: free
    databaseName: yellowbook
    user: yellowbook
