services:
  postgres:
    image: postgres:16-alpine
    container_name: yellowbook-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: yellowbook
    ports:
      - "5432:5432"
    volumes:
      - yellowbook_pg_data:/var/lib/postgresql/data

volumes:
  yellowbook_pg_data:
